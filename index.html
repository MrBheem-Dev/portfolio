<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Vigneshwaran Theerthagiri — Full Stack Developer</title>

<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>

<style>
:root {
  --accent: #7c5cfc;
  --accent2: #fc5c7d;
  --accent3: #43e8d8;
  --glass: rgba(255,255,255,0.07);
  --glass-border: rgba(255,255,255,0.13);
  --glass-hover: rgba(255,255,255,0.13);
  --text: #f0eeff;
  --muted: rgba(240,238,255,0.55);
  --bg1: #0d0b1e;
  --bg2: #130f2e;
}

* { margin:0; padding:0; box-sizing:border-box; }
body {
  font-family: 'DM Sans', sans-serif;
  background: var(--bg1);
  color: var(--text);
  overflow-x: hidden;
}

/* NAV */
nav {
  position: fixed;
  width:100%;
  padding:20px 40px;
  display:flex;
  justify-content:space-between;
  background:rgba(0,0,0,0.6);
}
.nav-links { display:flex; gap:20px; list-style:none; }

/* HERO */
#hero {
  min-height:100vh;
  display:flex;
  align-items:center;
  justify-content:center;
  text-align:center;
  padding:100px 20px;
}
.hero-name {
  font-size:4rem;
}
.hero-cta {
  margin-top:20px;
}
.btn-primary, .btn-outline {
  padding:12px 24px;
  margin:5px;
  display:inline-block;
  text-decoration:none;
}

/* GRID */
.projects-grid {
  display:grid;
  grid-template-columns:repeat(2,1fr);
  gap:20px;
}
.project-card {
  padding:20px;
  border:1px solid #333;
}

/* CONTACT */
.contact-link {
  display:flex;
  gap:10px;
}

/* ========================= */
/* ✅ RESPONSIVE FIX */
/* ========================= */

@media (max-width: 900px) {

  nav {
    padding: 14px 16px;
  }

  .nav-links {
    gap: 12px;
    font-size: 0.8rem;
  }

  #hero, #about, #skills, #projects, #contact {
    padding: 70px 16px;
  }

  .hero-name {
    font-size: 2.2rem;
    line-height: 1.2;
  }

  .hero-title {
    font-size: 0.9rem;
  }

  .hero-desc {
    font-size: 0.9rem;
  }

  .hero-cta {
    flex-direction: column;
  }

  .btn-primary, .btn-outline {
    width: 100%;
    text-align: center;
  }

  .projects-grid {
    grid-template-columns: 1fr;
  }

  .contact-link {
    flex-direction: column;
    align-items: flex-start;
  }
}

@media (max-width: 480px) {

  .hero-name {
    font-size: 1.8rem;
  }

}
</style>
</head>

<body>

<nav>
  <div>VT</div>
  <ul class="nav-links">
    <li><a href="#about">About</a></li>
    <li><a href="#projects">Projects</a></li>
    <li><a href="#contact">Contact</a></li>
  </ul>
</nav>

<section id="hero">
  <div>
    <h1 class="hero-name">Vigneshwaran<br/>Theerthagiri</h1>
    <p>Full Stack Developer</p>
    <div class="hero-cta">
      <a href="#projects" class="btn-primary">View Projects</a>
      <a href="#contact" class="btn-outline">Contact</a>
    </div>
  </div>
</section>

<section id="projects">
  <h2>Projects</h2>
  <div class="projects-grid">
    <div class="project-card">CRM System</div>
    <div class="project-card">VMS</div>
    <div class="project-card">Ticket App</div>
    <div class="project-card">Inventory</div>
  </div>
</section>

<section id="contact">
  <h2>Contact</h2>
  <div class="contact-link">📱 +91 8124791232</div>
  <div class="contact-link">✉️ vickysugu043@gmail.com</div>
</section>

</body>
</html>
